<script>
(function(){
  var T=window.EGRRA_TEX;
  var DATA=(function(){try{var s=localStorage.getItem('egrra_data');if(s){var d=JSON.parse(s);if(d&&d.products)return d;}}catch(e){}return window.EGRRA_DEFAULT_DATA||{products:[]};})();
  var PRODUCTS=DATA.products||[];
  var seriesList=["全部"].concat(uniq(PRODUCTS.map(function(p){return p.series;})));
  var tones=[{key:"全部",label:"全部"}].concat(T.TONES.map(function(t){return {key:t.key,label:t.label};}));
  var state={series:"全部",tone:"全部"};

  function uniq(a){var o=[],s={};a.forEach(function(x){if(x&&!s[x]){s[x]=1;o.push(x);}});return o;}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function bg(p){return p.img?('url("'+p.img+'")'):T.tex(p.stone);}

  function chips(host,items,cur,onPick){
    host.innerHTML="";
    items.forEach(function(it){
      var val=it.key||it, lab=it.label||it;
      var b=document.createElement("button");b.className="fchip"+(val===cur?" on":"");b.textContent=lab;
      b.addEventListener("click",function(){onPick(val);});
      host.appendChild(b);
    });
  }
  function renderChips(){
    chips(document.getElementById("f-series"),seriesList,state.series,function(v){state.series=v;render();});
    chips(document.getElementById("f-tone"),tones,state.tone,function(v){state.tone=v;render();});
  }
  function match(p){
    if(state.series!=="全部"&&p.series!==state.series)return false;
    if(state.tone!=="全部"&&T.toneOf(p.stone)!==state.tone)return false;
    return true;
  }
  function render(){
    renderChips();
    var grid=document.getElementById("grid");grid.innerHTML="";
    var list=PRODUCTS.filter(match);
    document.getElementById("count").textContent="共 "+list.length+" 款";
    if(!list.length){grid.innerHTML='<div class="noresult">找不到符合的花色，換個條件看看 🙂</div>';return;}
    list.forEach(function(p){
      var c=document.createElement("div");c.className="card";
      c.innerHTML='<div class="th" style="background-image:'+bg(p)+'"><span class="tag">'+esc(p.series||"")+'</span></div>'+
                  '<div class="cap"><h3>'+esc(p.name)+'</h3><p>'+esc(p.sizes||"")+'</p></div>';
      c.addEventListener("click",function(){openModal(p);});
      grid.appendChild(c);
    });
  }

  var ov=document.getElementById("ov");
  function openModal(p){
    document.getElementById("m-img").style.backgroundImage=bg(p);
    document.getElementById("m-series").textContent=(p.series||"藝格板");
    document.getElementById("m-name").textContent=p.name||"";
    document.getElementById("m-desc").textContent=p.desc||"以 PrinTex™ 專利數位紋理技術製作，高仿真還原天然質感，可依需求客製基材與尺寸。";
    document.getElementById("m-spec").innerHTML=
      row("尺寸",p.sizes||"4×4 / 4×8 / 4×10 / 5×10 尺")+
      row("表面處理",p.finish||"立體紋路・霧光・平光・消光")+
      row("計價",p.priceUnit||"以才計價，依需求數量報價");
    /* 相關花色（同系列，最多 5 款）*/
    var rel=PRODUCTS.filter(function(x){return x.series===p.series&&x.name!==p.name;}).slice(0,5);
    var relHtml="";
    if(rel.length){relHtml='<h4>同系列花色</h4><div class="mrel-items">'+rel.map(function(r){
      return '<div class="ri" title="'+esc(r.name)+'" style="background-image:'+bg(r)+'" data-name="'+esc(r.name)+'"></div>';}).join("")+'</div>';}
    var relBox=document.getElementById("m-rel");relBox.innerHTML=relHtml;
    relBox.querySelectorAll(".ri").forEach(function(ri){ri.addEventListener("click",function(){
      var t=PRODUCTS.filter(function(x){return x.name===ri.dataset.name;})[0];if(t)openModal(t);});});
    ov.classList.add("show");
  }
  function row(k,v){return '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>';}
  document.getElementById("m-close").addEventListener("click",function(){ov.classList.remove("show");});
  ov.addEventListener("click",function(e){if(e.target===ov)ov.classList.remove("show");});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")ov.classList.remove("show");});

  render();
})();
</script>
<script>
/* 基材切換器 + 走道場景模擬 */
(function(){
  var T=window.EGRRA_TEX;var box=document.getElementById("mat-tex");if(!T||!box)return;
  var fin=document.getElementById("mat-fin"),cap=document.getElementById("mat-cap");
  var subsEl=document.getElementById("mat-subs"),pickEl=document.getElementById("mat-picker"),viewsEl=document.getElementById("mat-views");
  var scene=document.getElementById("mat-scene"),
      wl=document.getElementById("sc-wl"),wr=document.getElementById("sc-wr"),ew=document.getElementById("sc-ew"),
      fl=document.getElementById("sc-fl"),fr=document.getElementById("sc-fr");
  var photo=document.getElementById("mat-photo"),matbox=document.querySelector(".matbox"),
      tex1=document.getElementById("ph-tex1"),tex2=document.getElementById("ph-tex2"),
      fin1=document.getElementById("ph-fin1"),fin2=document.getElementById("ph-fin2"),
      s1=document.getElementById("ph-s1"),s2=document.getElementById("ph-s2"),r2=document.getElementById("ph-r2"),
      wallsEl=document.getElementById("mat-walls"),rowWalls=document.getElementById("row-walls");

  /* ---- 單應性（homography）：把矩形紋理精準映射到照片上牆面的四個角點 ---- */
  function adjM(m){return[m[4]*m[8]-m[5]*m[7],m[2]*m[7]-m[1]*m[8],m[1]*m[5]-m[2]*m[4],
    m[5]*m[6]-m[3]*m[8],m[0]*m[8]-m[2]*m[6],m[2]*m[3]-m[0]*m[5],
    m[3]*m[7]-m[4]*m[6],m[1]*m[6]-m[0]*m[7],m[0]*m[4]-m[1]*m[3]];}
  function mulMM(a,b){var c=[],i,j,k,s;for(i=0;i<3;i++)for(j=0;j<3;j++){s=0;for(k=0;k<3;k++)s+=a[3*i+k]*b[3*k+j];c[3*i+j]=s;}return c;}
  function mulMV(m,v){return[m[0]*v[0]+m[1]*v[1]+m[2]*v[2],m[3]*v[0]+m[4]*v[1]+m[5]*v[2],m[6]*v[0]+m[7]*v[1]+m[8]*v[2]];}
  function basis(x1,y1,x2,y2,x3,y3,x4,y4){var m=[x1,x2,x3,y1,y2,y3,1,1,1];var v=mulMV(adjM(m),[x4,y4,1]);
    return mulMM(m,[v[0],0,0,0,v[1],0,0,0,v[2]]);}
  function proj2d(w,h,d){ /* (0,0)(w,0)(0,h)(w,h) → 四個目的點 d=[[x,y]x4: TL,TR,BL,BR] */
    var s=basis(0,0,w,0,0,h,w,h),t=basis(d[0][0],d[0][1],d[1][0],d[1][1],d[2][0],d[2][1],d[3][0],d[3][1]);
    var m=mulMM(t,adjM(s));for(var i=0;i<9;i++)m[i]/=m[8];
    return "matrix3d("+[m[0],m[3],0,m[6],m[1],m[4],0,m[7],0,0,1,0,m[2],m[5],0,m[8]].join(",")+")";}

  /* 牆面角點（照片 % 座標；TL,TR,BL,BR）——量自實照 */
  var Q1=[[0,8.2],[43.6,48.9],[0,112],[43.6,76.8]];      /* 左側木紋大牆 */
  var Q2=[[21.4,34.6],[34.6,37.6],[21.4,84],[34.6,81]];/* 拱內石牆（略帶角度）*/
  function fit(){
    if(!photo||photo.style.display==="none")return;
    var r=photo.getBoundingClientRect();if(!r.width)return;
    function px(q){return q.map(function(p){return[p[0]*r.width/100,p[1]*r.height/100];});}
    tex1.style.transformOrigin="0 0";tex2.style.transformOrigin="0 0"; /* inline 保證生效 */
    tex1.style.transform=proj2d(tex1.offsetWidth,tex1.offsetHeight,px(Q1));
    tex2.style.transform=proj2d(tex2.offsetWidth,tex2.offsetHeight,px(Q2));
  }
  window.addEventListener("resize",fit);
  var surf={s1:true,s2:true};

  /* Chrome 對「含 feTurbulence 的 SVG 背景」在 matrix3d 下會渲染異常（濾鏡失效/範圍被裁）
     → 先用 canvas 把 SVG 紋理烙成 PNG 再當背景 */
  var rasterCache={};
  function rasterTex(stone,cb){
    if(rasterCache[stone])return cb(rasterCache[stone]);
    var u=T.tex(stone);              /* url("data:image/svg+xml,...") */
    var src=u.slice(5,-2);
    var img=new Image();
    img.onload=function(){
      try{
        var c=document.createElement("canvas");c.width=400;c.height=500;
        c.getContext("2d").drawImage(img,0,0,400,500);
        rasterCache[stone]='url("'+c.toDataURL("image/png")+'")';
        cb(rasterCache[stone]);
      }catch(e){cb(u);}
    };
    img.onerror=function(){cb(u);};
    img.src=src;
  }
  var SUBS=[["al","鋁"],["glass","玻璃"],["metal","金屬"],["wood","木質"]];
  var TX=[["卡拉拉","carrara"],["帝寶米黃","beige"],["加里奧金","gold"],["聖羅蘭黑","black"],["深灰石紋","darkgrey"]];
  var VIEWS=[["photo","實景照片"],["scene","走道場景"],["flat","平面樣板"]];
  var st={stone:"carrara",name:"卡拉拉",sub:"al",subZh:"鋁",view:"photo"};

  VIEWS.forEach(function(v){var b=document.createElement("button");b.textContent=v[1];if(v[0]===st.view)b.className="on";
    b.addEventListener("click",function(){st.view=v[0];[].forEach.call(viewsEl.children,function(c){c.classList.remove("on");});b.classList.add("on");render();});viewsEl.appendChild(b);});
  /* 牆面開關（實景照片模式；彩虹屋式：各牆獨立套用/還原）*/
  [["s1","左側大牆"],["s2","拱內石牆"]].forEach(function(w){
    var b=document.createElement("button");b.textContent=w[1];if(surf[w[0]])b.className="on";
    b.addEventListener("click",function(){surf[w[0]]=!surf[w[0]];b.classList.toggle("on",surf[w[0]]);render();});
    wallsEl.appendChild(b);});
  SUBS.forEach(function(s){var b=document.createElement("button");b.textContent=s[1];if(s[0]===st.sub)b.className="on";
    b.addEventListener("click",function(){st.sub=s[0];st.subZh=s[1];[].forEach.call(subsEl.children,function(c){c.classList.remove("on");});b.classList.add("on");render();});subsEl.appendChild(b);});
  TX.forEach(function(t){var b=document.createElement("button");b.style.backgroundImage=T.tex(t[1]);b.title=t[0];if(t[1]===st.stone)b.className="on";
    b.addEventListener("click",function(){st.stone=t[1];st.name=t[0];[].forEach.call(pickEl.children,function(c){c.classList.remove("on");});b.classList.add("on");render();});pickEl.appendChild(b);});

  /* 牆面圖層：深度陰影 + 踢腳線 + 板材分割縫 + 石紋（far=遠端方向）*/
  function wallBg(texUrl,far){
    return "linear-gradient(to "+far+",rgba(0,0,0,.04) 0%,rgba(0,0,0,.42) 62%,rgba(0,0,0,.72) 100%),"+
           "linear-gradient(to top,rgba(18,16,14,.92) 0 3.5%,rgba(18,16,14,0) 3.5%),"+
           "repeating-linear-gradient(90deg,rgba(0,0,0,.30) 0 2px,rgba(255,255,255,.06) 2px 3px,transparent 3px 240px),"+
           texUrl;
  }
  function render(){
    var tex=T.tex(st.stone);
    /* 平面樣板 */
    box.style.backgroundImage=tex;fin.className="finish fin-"+st.sub;
    /* 走道場景：左右牆 + 端牆 */
    wl.style.backgroundImage=wallBg(tex,"right");
    wl.style.backgroundSize="auto,auto,auto,240px 400px";
    wr.style.backgroundImage=wallBg(tex,"left");
    wr.style.backgroundSize="auto,auto,auto,240px 400px";
    ew.style.backgroundImage="radial-gradient(60% 32% at 50% 0%,rgba(255,240,208,.22),transparent 70%),"+
      "linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),"+tex;
    ew.style.backgroundSize="auto,auto,240px 400px";
    fl.className="wfin finish fin-"+st.sub;fr.className="wfin finish fin-"+st.sub;
    /* 實景照片：兩面牆各自套紋理（板材分縫跟著單應性透視精準收斂） */
    if(tex1){
      (function(stone){rasterTex(stone,function(png){
        if(stone!==st.stone)return; /* 使用者已換色，略過過期回呼 */
        tex1.style.backgroundImage="repeating-linear-gradient(90deg,rgba(0,0,0,.32) 0 2px,rgba(255,255,255,.08) 2px 3px,transparent 3px 200px),"+png;
        tex1.style.backgroundSize="auto,200px 100%";
        tex2.style.backgroundImage="repeating-linear-gradient(90deg,rgba(0,0,0,.32) 0 2px,rgba(255,255,255,.08) 2px 3px,transparent 3px 133px),"+png;
        tex2.style.backgroundSize="auto,133px 100%";
      });})(st.stone);
      fin1.className="wfin finish fin-"+st.sub;fin2.className="wfin finish fin-"+st.sub;
      s1.style.display=surf.s1?"":"none";
      s2.style.display=surf.s2?"":"none";
      r2.style.display=surf.s2?"none":"";
    }
    /* 顯示模式 */
    var sc=st.view==="scene",ph=st.view==="photo";
    scene.style.display=sc?"":"none";
    if(photo)photo.style.display=ph?"":"none";
    if(matbox)matbox.classList.toggle("ph",ph);
    if(rowWalls)rowWalls.style.display=ph?"":"none";
    box.style.display=(sc||ph)?"none":"";fin.style.display=(sc||ph)?"none":"";
    if(ph)requestAnimationFrame(fit);
    cap.innerHTML="PrinTex™　<b>"+st.name+"</b>　·　"+st.subZh+"基材"+(sc?"　·　公設走道模擬":(ph?"　·　社區健身房・實景模擬":""));
  }
  render();
})();
</script>
<script src="line-widget.js"></script>
<script src="chatbot.js"></script>
</body>
