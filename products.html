<script>
(function(){
  var T=window.EGRRA_TEX;
  var DATA=(function(){try{var s=localStorage.getItem('egrra_data');if(s){var d=JSON.parse(s);if(d&&d.products)return d;}}catch(e){}return window.EGRRA_DEFAULT_DATA||{products:[]};})();
  var PRODUCTS=DATA.products||[];
  var seriesList=["全部"].concat(uniq(PRODUCTS.map(function(p){return p.series;})));
  var tones=[{key:"全部",label:"全部"}].concat(T.TONES.map(function(t){return {key:t.key,label:t.label};}));
  var state={series:"全部",tone:"全部"};

  function uniq(a){var o=[],s={};a.forEach(function(x){if(x&&!s[x]){s[x]=1;o.push(x);}});return o;}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function bg(p){return p.img?('url("'+p.img+'")'):T.tex(p.stone);}

  function chips(host,items,cur,onPick){
    host.innerHTML="";
    items.forEach(function(it){
      var val=it.key||it, lab=it.label||it;
      var b=document.createElement("button");b.className="fchip"+(val===cur?" on":"");b.textContent=lab;
      b.addEventListener("click",function(){onPick(val);});
      host.appendChild(b);
    });
  }
  function renderChips(){
    chips(document.getElementById("f-series"),seriesList,state.series,function(v){state.series=v;render();});
    chips(document.getElementById("f-tone"),tones,state.tone,function(v){state.tone=v;render();});
  }
  function match(p){
    if(state.series!=="全部"&&p.series!==state.series)return false;
    if(state.tone!=="全部"&&T.toneOf(p.stone)!==state.tone)return false;
    return true;
  }
  function render(){
    renderChips();
    var grid=document.getElementById("grid");grid.innerHTML="";
    var list=PRODUCTS.filter(match);
    document.getElementById("count").textContent="共 "+list.length+" 款";
    if(!list.length){grid.innerHTML='<div class="noresult">找不到符合的花色，換個條件看看 🙂</div>';return;}
    list.forEach(function(p){
      var c=document.createElement("div");c.className="card";
      c.innerHTML='<div class="th" style="background-image:'+bg(p)+'"><span class="tag">'+esc(p.series||"")+'</span></div>'+
                  '<div class="cap"><h3>'+esc(p.name)+'</h3><p>'+esc(p.sizes||"")+'</p></div>';
      c.addEventListener("click",function(){openModal(p);});
      grid.appendChild(c);
    });
  }

  var ov=document.getElementById("ov");
  function openModal(p){
    document.getElementById("m-img").style.backgroundImage=bg(p);
    document.getElementById("m-series").textContent=(p.series||"藝格板");
    document.getElementById("m-name").textContent=p.name||"";
    document.getElementById("m-desc").textContent=p.desc||"以 PrinTex™ 專利數位紋理技術製作，高仿真還原天然質感，可依需求客製基材與尺寸。";
    document.getElementById("m-spec").innerHTML=
      row("尺寸",p.sizes||"4×4 / 4×8 / 4×10 / 5×10 尺")+
      row("表面處理",p.finish||"立體紋路・霧光・平光・消光")+
      row("計價",p.priceUnit||"以才計價，依需求數量報價");
    /* 相關花色（同系列，最多 5 款）*/
    var rel=PRODUCTS.filter(function(x){return x.series===p.series&&x.name!==p.name;}).slice(0,5);
    var relHtml="";
    if(rel.length){relHtml='<h4>同系列花色</h4><div class="mrel-items">'+rel.map(function(r){
      return '<div class="ri" title="'+esc(r.name)+'" style="background-image:'+bg(r)+'" data-name="'+esc(r.name)+'"></div>';}).join("")+'</div>';}
    var relBox=document.getElementById("m-rel");relBox.innerHTML=relHtml;
    relBox.querySelectorAll(".ri").forEach(function(ri){ri.addEventListener("click",function(){
      var t=PRODUCTS.filter(function(x){return x.name===ri.dataset.name;})[0];if(t)openModal(t);});});
    ov.classList.add("show");
  }
  function row(k,v){return '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>';}
  document.getElementById("m-close").addEventListener("click",function(){ov.classList.remove("show");});
  ov.addEventListener("click",function(e){if(e.target===ov)ov.classList.remove("show");});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")ov.classList.remove("show");});

  render();
})();
</script>
