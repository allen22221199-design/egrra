.mattex{position:absolute;inset:0;background-size:cover;background-position:center;transition:.4s var(--ease)}
.finish{position:absolute;inset:0;pointer-events:none;transition:opacity .4s,background .4s}
.fin-al{background:linear-gradient(115deg,rgba(255,255,255,.14),transparent 40%,rgba(0,0,0,.12));mix-blend-mode:soft-light;opacity:.9}
.fin-glass{background:linear-gradient(115deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 22%,rgba(255,255,255,.12) 45%,transparent 62%),linear-gradient(to bottom,rgba(255,255,255,.22),transparent 32%);mix-blend-mode:screen;opacity:.8}

/* ---- 3D 場景模擬（依實照建模：左牆拱門/右牆開窗/端牆玻璃門/黑燈帶天花/地毯）---- */
.mscene{position:absolute;inset:0;--d:2200px;perspective:950px;perspective-origin:53% 54%;background:#0d0c0b}
.mscene .room{position:absolute;inset:0;transform-style:preserve-3d}
.mscene .pl{position:absolute;background-repeat:repeat}
.mscene .wallL{left:0;top:-3%;height:106%;width:var(--d);transform-origin:left center;transform:rotateY(90deg)}
.mscene .wallR{right:0;top:-3%;height:106%;width:var(--d);transform-origin:right center;transform:rotateY(-90deg)}
.mscene .floor{left:-2%;width:104%;bottom:0;height:var(--d);transform-origin:center bottom;transform:rotateX(90deg);
  background:
    linear-gradient(to top,rgba(0,0,0,0) 0%,rgba(0,0,0,.5) 74%,rgba(0,0,0,.8) 100%),
    repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 2px,transparent 2px 6px),
    repeating-linear-gradient(0deg,rgba(0,0,0,.1) 0 2px,transparent 2px 7px),
    linear-gradient(115deg,#716f69,#84827c 50%,#67655f)}
.mscene .ceil{left:-2%;width:104%;top:0;height:var(--d);transform-origin:center top;transform:rotateX(-90deg);
  background:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.5) 78%,rgba(0,0,0,.75) 100%),#e9e6e1}
.mscene .strip{position:absolute;left:33%;width:7%;top:0;height:100%;background:#141210;box-shadow:0 0 34px rgba(0,0,0,.4)}
.mscene .dots{position:absolute;left:60%;width:4%;top:60px;height:100%;
  background:radial-gradient(circle at 50% 16px,#16130f 9px,transparent 11px);background-size:100% 230px;background-repeat:repeat-y}
.mscene .endw{left:-2%;top:-3%;width:104%;height:106%;transform:translateZ(calc(var(--d) * -1))}
.mscene .gdoor{position:absolute;left:39%;width:24%;top:24%;bottom:0;
  background:linear-gradient(#211f1d,#191715);box-shadow:0 0 0 6px #0f0d0c,inset 0 0 34px rgba(130,150,160,.16)}
.mscene .arch{position:absolute;left:50%;width:16%;top:30%;bottom:5%;background:linear-gradient(#332e29,#211d19 70%,#191512);
  border-radius:50% 50% 0 0/24% 24% 0 0;box-shadow:0 0 0 7px #12100e,inset 0 -30px 70px rgba(0,0,0,.55)}
.mscene .arch::before{content:"";position:absolute;left:12%;right:12%;top:3%;height:13%;
  background:radial-gradient(52% 100% at 50% 0,rgba(255,220,165,.85),transparent 72%)}
.mscene .win{position:absolute;top:15%;bottom:23%;
  background:linear-gradient(115deg,#e9eef3,#ccd6dd 55%,#b9c4cc);box-shadow:0 0 0 8px #14110f,inset 0 0 44px rgba(255,255,255,.55)}
.mscene .win::after{content:"";position:absolute;left:48%;width:4%;top:0;bottom:0;background:#14110f}
.mscene .w1{left:58%;width:25%}
.mscene .w2{left:24%;width:19%}
.mscene .wfin{position:absolute;inset:0;pointer-events:none}
.mscene .fog{position:absolute;inset:0;pointer-events:none;

.matcap{position:absolute;left:0;bottom:0;padding:16px 22px;color:#fff;font-size:14px;letter-spacing:.03em;z-index:2;background:linear-gradient(transparent,rgba(0,0,0,.55));width:100%}

.subs button:hover{border-color:var(--gold-lt);color:#fff}

<script>
(function(){
  var T=window.EGRRA_TEX;
  var DATA=(function(){try{var s=localStorage.getItem('egrra_data');if(s){var d=JSON.parse(s);if(d&&d.products)return d;}}catch(e){}return window.EGRRA_DEFAULT_DATA||{products:[]};})();
  var PRODUCTS=DATA.products||[];
  var seriesList=["全部"].concat(uniq(PRODUCTS.map(function(p){return p.series;})));
  var tones=[{key:"全部",label:"全部"}].concat(T.TONES.map(function(t){return {key:t.key,label:t.label};}));
  var state={series:"全部",tone:"全部"};

  function uniq(a){var o=[],s={};a.forEach(function(x){if(x&&!s[x]){s[x]=1;o.push(x);}});return o;}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function bg(p){return p.img?('url("'+p.img+'")'):T.tex(p.stone);}

  function chips(host,items,cur,onPick){
    host.innerHTML="";
    items.forEach(function(it){
      var val=it.key||it, lab=it.label||it;
      var b=document.createElement("button");b.className="fchip"+(val===cur?" on":"");b.textContent=lab;
      b.addEventListener("click",function(){onPick(val);});
      host.appendChild(b);
    });
  }
  function renderChips(){
    chips(document.getElementById("f-series"),seriesList,state.series,function(v){state.series=v;render();});
    chips(document.getElementById("f-tone"),tones,state.tone,function(v){state.tone=v;render();});
  }
  function match(p){
    if(state.series!=="全部"&&p.series!==state.series)return false;
    if(state.tone!=="全部"&&T.toneOf(p.stone)!==state.tone)return false;
    return true;
  }
  function render(){
    renderChips();
    var grid=document.getElementById("grid");grid.innerHTML="";
    var list=PRODUCTS.filter(match);
    document.getElementById("count").textContent="共 "+list.length+" 款";
    if(!list.length){grid.innerHTML='<div class="noresult">找不到符合的花色，換個條件看看 🙂</div>';return;}
    list.forEach(function(p){
      var c=document.createElement("div");c.className="card";
      c.innerHTML='<div class="th" style="background-image:'+bg(p)+'"><span class="tag">'+esc(p.series||"")+'</span></div>'+
                  '<div class="cap"><h3>'+esc(p.name)+'</h3><p>'+esc(p.sizes||"")+'</p></div>';
      c.addEventListener("click",function(){openModal(p);});
      grid.appendChild(c);
    });
  }

  var ov=document.getElementById("ov");
  function openModal(p){
    document.getElementById("m-img").style.backgroundImage=bg(p);
    document.getElementById("m-series").textContent=(p.series||"藝格板");
    document.getElementById("m-name").textContent=p.name||"";
    document.getElementById("m-desc").textContent=p.desc||"以 PrinTex™ 專利數位紋理技術製作，高仿真還原天然質感，可依需求客製基材與尺寸。";
    document.getElementById("m-spec").innerHTML=
      row("尺寸",p.sizes||"4×4 / 4×8 / 4×10 / 5×10 尺")+
      row("表面處理",p.finish||"立體紋路・霧光・平光・消光")+
      row("計價",p.priceUnit||"以才計價，依需求數量報價");
    /* 相關花色（同系列，最多 5 款）*/
    var rel=PRODUCTS.filter(function(x){return x.series===p.series&&x.name!==p.name;}).slice(0,5);
    var relHtml="";
    if(rel.length){relHtml='<h4>同系列花色</h4><div class="mrel-items">'+rel.map(function(r){
      return '<div class="ri" title="'+esc(r.name)+'" style="background-image:'+bg(r)+'" data-name="'+esc(r.name)+'"></div>';}).join("")+'</div>';}
    var relBox=document.getElementById("m-rel");relBox.innerHTML=relHtml;
    relBox.querySelectorAll(".ri").forEach(function(ri){ri.addEventListener("click",function(){
      var t=PRODUCTS.filter(function(x){return x.name===ri.dataset.name;})[0];if(t)openModal(t);});});
    ov.classList.add("show");
  }
  function row(k,v){return '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>';}
  document.getElementById("m-close").addEventListener("click",function(){ov.classList.remove("show");});
  ov.addEventListener("click",function(e){if(e.target===ov)ov.classList.remove("show");});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")ov.classList.remove("show");});

  render();
})();
</script>
<script>
/* 基材切換器：3D 場景（依實照建模，左/右/端三面牆整面換材質） */
(function(){
  var T=window.EGRRA_TEX;var scene=document.getElementById("mat-scene");if(!T||!scene)return;
  var cap=document.getElementById("mat-cap"),
      subsEl=document.getElementById("mat-subs"),pickEl=document.getElementById("mat-picker"),
      wallsEl=document.getElementById("mat-walls"),
      wl=document.getElementById("sc-wl"),wr=document.getElementById("sc-wr"),ew=document.getElementById("sc-ew"),
      fl=document.getElementById("sc-fl"),fr=document.getElementById("sc-fr");
  var SUBS=[["al","鋁"],["glass","玻璃"],["metal","金屬"],["wood","木質"]];
  var TX=[["卡拉拉","carrara"],["帝寶米黃","beige"],["加里奧金","gold"],["聖羅蘭黑","black"],["深灰石紋","darkgrey"]];
  var st={stone:"carrara",name:"卡拉拉",sub:"al",subZh:"鋁"};
  var w3={L:true,R:true,E:true};

  /* 牆面開關（彩虹屋式：各牆整面套用/還原） */
  [["L","左牆"],["R","右牆"],["E","端牆"]].forEach(function(w){
    var b=document.createElement("button");b.textContent=w[1];if(w3[w[0]])b.className="on";
    b.addEventListener("click",function(){w3[w[0]]=!w3[w[0]];b.classList.toggle("on",w3[w[0]]);render();});
    wallsEl.appendChild(b);});
  SUBS.forEach(function(s){var b=document.createElement("button");b.textContent=s[1];if(s[0]===st.sub)b.className="on";
    b.addEventListener("click",function(){st.sub=s[0];st.subZh=s[1];[].forEach.call(subsEl.children,function(c){c.classList.remove("on");});b.classList.add("on");render();});subsEl.appendChild(b);});
  TX.forEach(function(t){var b=document.createElement("button");b.style.backgroundImage=T.tex(t[1]);b.title=t[0];if(t[1]===st.stone)b.className="on";
    b.addEventListener("click",function(){st.stone=t[1];st.name=t[0];[].forEach.call(pickEl.children,function(c){c.classList.remove("on");});b.classList.add("on");render();});pickEl.appendChild(b);});

  /* Chrome 對含 feTurbulence 的 SVG 背景在 3D 變形下渲染異常 → canvas 先烙成 PNG */
  var rasterCache={};
  function rasterTex(stone,cb){
    if(rasterCache[stone])return cb(rasterCache[stone]);
    var u=T.tex(stone),src=u.slice(5,-2);
    var img=new Image();
    img.onload=function(){
      try{
        var c=document.createElement("canvas");c.width=640;c.height=800;
        c.getContext("2d").drawImage(img,0,0,640,800);
        rasterCache[stone]='url("'+c.toDataURL("image/png")+'")';
        cb(rasterCache[stone]);
      }catch(e){cb(u);}
    };
    img.onerror=function(){cb(u);};
    img.src=src;
  }

  /* 3D 牆面圖層：深度陰影 + 踢腳線 + 板材分割縫 + 石紋（far=遠端方向；整面套用）*/
  function wall3d(png,far){
    return "linear-gradient(to "+far+",rgba(0,0,0,.04) 0%,rgba(0,0,0,.4) 62%,rgba(0,0,0,.7) 100%),"+
           "linear-gradient(to top,rgba(18,16,14,.92) 0 3.2%,rgba(18,16,14,0) 3.2%),"+
           "repeating-linear-gradient(90deg,rgba(0,0,0,.30) 0 2px,rgba(255,255,255,.06) 2px 3px,transparent 3px 250px),"+
           png;
  }
  function wallPaint(far){ /* 牆面「關」＝中性烤漆 */
    return "linear-gradient(to "+far+",rgba(0,0,0,.04) 0%,rgba(0,0,0,.4) 62%,rgba(0,0,0,.7) 100%),"+
           "linear-gradient(to top,rgba(18,16,14,.92) 0 3.2%,rgba(18,16,14,0) 3.2%),"+
           "linear-gradient(#dad6cf,#dad6cf)";
  }
  function applyScene(png){
    wl.style.backgroundImage = w3.L? wall3d(png,"right") : wallPaint("right");
    wl.style.backgroundSize  = w3.L? "auto,auto,auto,250px 100%" : "auto";
    wr.style.backgroundImage = w3.R? wall3d(png,"left") : wallPaint("left");
    wr.style.backgroundSize  = w3.R? "auto,auto,auto,250px 100%" : "auto";
    if(w3.E){
      ew.style.backgroundImage="linear-gradient(rgba(0,0,0,.36),rgba(0,0,0,.36)),"+
        "repeating-linear-gradient(90deg,rgba(0,0,0,.3) 0 2px,transparent 2px 170px),"+png;
      ew.style.backgroundSize="auto,auto,170px 100%";
    }else{
      ew.style.backgroundImage="linear-gradient(rgba(0,0,0,.36),rgba(0,0,0,.36)),linear-gradient(#d6d2cb,#d6d2cb)";
      ew.style.backgroundSize="auto";
    }
    fl.className="wfin finish fin-"+st.sub;fr.className="wfin finish fin-"+st.sub;
    fl.style.display=w3.L?"":"none";fr.style.display=w3.R?"":"none";
  }
  function render(){
    (function(stone){rasterTex(stone,function(png){
      if(stone!==st.stone)return; /* 使用者已換色，略過過期回呼 */
      applyScene(png);
    });})(st.stone);
    cap.innerHTML="PrinTex™　<b>"+st.name+"</b>　·　"+st.subZh+"基材　·　3D 場景模擬";
  }
  render();
})();
</script>
