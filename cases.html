<script src="site-data.js"></script>
<script src="/api/published"></script><!-- 後台發布內容（Blob）覆蓋，無/失敗沿用預設 -->
<script src="textures.js"></script>
<script>
(function(){
  var T=window.EGRRA_TEX;
  var DATA=(function(){try{var s=localStorage.getItem('egrra_data');if(s){var d=JSON.parse(s);if(d&&d.cases)return d;}}catch(e){}return window.EGRRA_DEFAULT_DATA||{cases:[]};})();
  var CASES=DATA.cases||[];
  function cityOf(c){return (c.region||"").slice(0,2);}
  var cats=["全部"].concat(uniq(CASES.map(function(c){return c.category;})));
  var cities=["全部"].concat(uniq(CASES.map(cityOf)));
  var state={cat:"全部",city:"全部"};

  function uniq(a){var o=[],s={};a.forEach(function(x){if(x&&!s[x]){s[x]=1;o.push(x);}});return o;}
  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function bg(c){return c.img?('url("'+c.img+'")'):T.tex(c.stone);}

  function chips(host,items,cur,onPick){
    host.innerHTML="";
    items.forEach(function(it){
      var b=document.createElement("button");b.className="fchip"+(it===cur?" on":"");b.textContent=it;
      b.addEventListener("click",function(){onPick(it);});host.appendChild(b);
    });
  }
  function renderChips(){
    chips(document.getElementById("f-cat"),cats,state.cat,function(v){state.cat=v;render();});
    chips(document.getElementById("f-city"),cities,state.city,function(v){state.city=v;render();});
  }
  function match(c){
    if(state.cat!=="全部"&&c.category!==state.cat)return false;
    if(state.city!=="全部"&&cityOf(c)!==state.city)return false;
    return true;
  }
  function render(){
    renderChips();
    var grid=document.getElementById("grid");grid.innerHTML="";
    var list=CASES.filter(match);
    document.getElementById("count").textContent="共 "+list.length+" 件";
    if(!list.length){grid.innerHTML='<div class="noresult">找不到符合的案例，換個條件看看 🙂</div>';return;}
    list.forEach(function(c){
      var card=document.createElement("div");card.className="card";
      card.innerHTML='<div class="th"><div class="pf-ov"></div><span class="tag">'+esc(c.category||"")+'</span></div>'+
                     '<div class="cap"><h3>'+esc(c.region||"")+'</h3><p>'+esc(c.title||"")+(c.year?' ・ '+esc(c.year):'')+'</p></div>';
      card.querySelector(".th").style.backgroundImage=bg(c);
      card.addEventListener("click",function(){openModal(c);});
      grid.appendChild(card);
    });
  }

  var ov=document.getElementById("ov");
  function openModal(c){
    document.getElementById("m-img").style.backgroundImage=bg(c);
    document.getElementById("m-cat").textContent=c.category||"實績案例";
    document.getElementById("m-title").textContent=(c.region||"")+"　"+(c.title||"");
    document.getElementById("m-desc").textContent=c.desc||"本案以藝格板進行空間美化，通過耐燃一級測試，兼顧防火機能與設計質感。實際用料與尺寸依現場為準。";
    document.getElementById("m-spec").innerHTML=
      row("地區",c.region||"—")+row("類別",c.category||"—")+row("年份",c.year||"—");
    ov.classList.add("show");
  }
  function row(k,v){return '<div class="row"><span class="k">'+k+'</span><span class="v">'+esc(v)+'</span></div>';}
  document.getElementById("m-close").addEventListener("click",function(){ov.classList.remove("show");});
  ov.addEventListener("click",function(e){if(e.target===ov)ov.classList.remove("show");});
  document.addEventListener("keydown",function(e){if(e.key==="Escape")ov.classList.remove("show");});

  render();
})();
</script>
<script src="line-widget.js"></script>
<script src="chatbot.js"></script>
</body>
